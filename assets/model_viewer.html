<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; width: 100vw; height: 100vh; overflow: hidden; }
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #0a0a0a;
    }
  </style>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
</head>
<body>
  <model-viewer
    id="viewer"
    alt="Modelo 3D"
    auto-rotate
    camera-controls
    shadow-intensity="1">
  </model-viewer>
  <script>
    // Recibe la URL del modelo desde Flutter
    window.addEventListener('message', function(e) {
      const viewer = document.getElementById('viewer');
      viewer.src = e.data;
    });

    // También acepta parámetro en la URL
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src');
    if (src) {
      document.getElementById('viewer').src = decodeURIComponent(src);
    }
  </script>
</body>
</html>
