name: modelia
description: Tienda Modelia con AR
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  model_viewer_plus: ^1.7.0
  webview_flutter: ^4.10.0
  cupertino_icons: ^1.0.8
  webview_windows: ^0.4.0
  path_provider: ^2.1.3
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/model_viewer.html

dependency_overrides:
  webview_flutter_android: 4.10.13
