name: modelia
description: Tienda Modelia con AR
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  model_viewer_plus: ^1.7.0
  webview_flutter: ^4.10.0
  cupertino_icons: ^1.0.8
  webview_windows: ^0.4.0
  path_provider: ^2.1.3
  flutter_colorpicker: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/model_viewer.html
    - assets/splash/
    - assets/icons/

dependency_overrides:
  webview_flutter_android: 4.10.13

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0A0A0A"
  android: true
  fullscreen: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/icon.png
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: assets/icons/icon.png
  windows:
    generate: true
    image_path: assets/icons/icon.png
    icon_size: 256
  min_sdk_android: 21
